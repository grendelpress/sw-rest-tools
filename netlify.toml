[build]
functions = "netlify/functions"
publish = "public"
command = "echo 'No build step needed for static site'"

[functions]
node_bundler = "esbuild"

[[redirects]]
  from = "/.netlify/functions/*"
  to = "/.netlify/functions/:splat"
  status = 200

[[redirects]]
  from = "/tools"
  to = "/tools.html"
  status = 200

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
